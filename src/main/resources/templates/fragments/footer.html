<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Footer fragment - rest is empty</title>
</head>

<body>
    <!-- ver https://getbootstrap.com/docs/5.0/examples/sticky-footer-navbar/ -->
    <footer th:fragment="footer" class="footer mt-auto py-2 bg-dark border-top border-white border-2 border-opacity-75">
        <div class="container text-center">
            <span class="text-white">
                Timba de Pepe 2026. <a href="https://github.com/JorgeGUCM/Timba_de_Pepe">Repositorio</a> de 
                <a href="https://www.apache.org/licenses/LICENSE-2.0">código abierto</a>
                basado en la
                <a href="https://github.com/manuel-freire/iw/blob/main/plantilla">plantilla</a>
                de Manuel Freire.
            </span>
        </div>
        <!-- Bootstrap -->
        <script th:src="@{/js/bootstrap.bundle-5.3.3.js}" src="js/bootstrap.bundle-5.3.3.js"></script>

        <!-- Websockets -->
        <script th:src="@{/js/stomp.js}" src="js/stomp.js"></script>
        <script th:src="@{/js/iw.js}" src="js/iw.js"></script>

        <!-- Otros scripts de interacción, aquí -->
    </footer>
</body>

</html>
