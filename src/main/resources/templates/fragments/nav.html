<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Nav fragment - rest intentionally left empty</title>
</head>

<body class="d-flex flex-column h-100">

    <!-- barra de navegación bootstrap 5 -->
    <header th:fragment="nav">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-white border-2 border-opacity-75">
            <div class="container-fluid">
                <!-- nombre del sitio; es un enlace que lleva a la página ppal -->
                <a class="navbar-brand" th:href="@{/}" href="/">
                    <img th:src="@{/img/logo.png}" src="/img/logo.png" alt="logo IW" width="32" height="32" class="d-inline-block align-text-top"> La Timba de Pepe
                </a>
                <!-- menu hamburguesa si no cabe todo -->
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto">

                        <li class="nav-item"><a class="nav-link" th:href="@{/ranking}">Ranking</a></li>
                        
                        <li class="nav-item" th:if="${session.u != null}">
                            <a class="nav-link" th:href="@{/salas}">Salas de Juego</a>
                        </li>
                       
                        <li class="nav-item"><a class="nav-link" th:href="@{/reglas}">Reglas</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/autores}">Autores</a></li>

                        <th:block th:if="${u}">
                            <li class="nav-item mx-3">
                                <a class="nav-link" th:if="${u.hasRole('ADMIN')}" th:href="@{/admin/}">Administrar</a>
                            </li>

                            <li class="nav-item mx-2">
                                <a class="nav-link" th:href="@{/perfil-usuario}">
                                    <img class="iwthumb rounded" th:src="@{/user/{id}/pic(id=${u.id})}">
                                    <span id="username-nav" th:text="${u.username}">Pepe</span>
                                </a>
                            </li>
                            <li class="nav-item mx-2 align-self-center">
                                <p class="badge text-bg-primary fs-6 fw-bold text-white m-auto">
                                    <span id="display-fichas" th:text="${u.fichas}">???</span>
                                    <svg
                                        style="filter:invert(1); width: 1.2em; transform: translateY(-0.15em);" xmlns="http://www.w3.org/2000/svg"
                                        viewBox="0 0 640 640">
                                        <path
                                            d="M471.9 324.8L320 417.6L168 324.8L320 64L471.9 324.8zM320 447.4L168 354.6L320 576L472 354.6L320 447.4z" />
                                    </svg>
                                </p>
                            </li>
                            <li class="nav-item mx-2 align-self-center">
                                <p class="badge text-bg-warning fs-6 fw-bold text-white m-auto">
                                    <span th:text="${u.cervezas_actuales}">???</span>
                                    <svg
                                        style="filter: invert(1);width: 1.2em; transform: translateY(-0.1em);" xmlns="http://www.w3.org/2000/svg"
                                        viewBox="0 0 640 640">
                                        <path
                                            d="M96 144C96 117.5 117.5 96 144 96L432 96C458.5 96 480 117.5 480 144L480 160L544 160C579.3 160 608 188.7 608 224L608 332.2C608 356.4 594.3 378.6 572.6 389.4L480 435.8L480 448C480 501 437 544 384 544L192 544C139 544 96 501 96 448L96 144zM480 364.2L544 332.2L544 224L480 224L480 364.2zM224 216C224 202.7 213.3 192 200 192C186.7 192 176 202.7 176 216L176 424C176 437.3 186.7 448 200 448C213.3 448 224 437.3 224 424L224 216zM312 216C312 202.7 301.3 192 288 192C274.7 192 264 202.7 264 216L264 424C264 437.3 274.7 448 288 448C301.3 448 312 437.3 312 424L312 216zM400 216C400 202.7 389.3 192 376 192C362.7 192 352 202.7 352 216L352 424C352 437.3 362.7 448 376 448C389.3 448 400 437.3 400 424L400 216z" />
                                    </svg>
                                </p>
                            </li>
                            <li class="nav-item align-self-center">
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="btn btn-outline-secondary btn-sm">logout</button>
                                </form>
                            </li>
                        </th:block>
                        <th:block th:unless="${u}">
                            <li class="nav-item mx-2">
                                <a class="nav-link" th:href="@{/login}" href="/login">Login</a>
                            </li>
                            <!--/*
                                Esto es un comentario "thymeleaf" - no se verá en el HTML
                                El bloque de "debug" sólo está activado si application.properties tiene debug a "true"
                                    (ver StartupConfig.java para ver cómo se lee de la configuración
                                    y luego se escribe a ${application.debug})
                            */-->
                            <li class="nav-item debug align-self-center" th:if="${application.debug}">
                                <form class="d-flex" th:action="@{/login}" method="post">
                                    <input type="hidden" name="username" value="a">
                                    <input type="hidden" name="password" value="aa">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">a</button>
                                </form>
                            </li>
                            <li class="nav-item debug align-self-center" th:if="${application.debug}">
                                <form class="d-flex" th:action="@{/login}" method="post">
                                    <input type="hidden" name="username" value="b">
                                    <input type="hidden" name="password" value="aa">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">b</button>
                                </form>
                            </li>
                        </th:block>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
</body>

</html>
