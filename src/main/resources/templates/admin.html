<!DOCTYPE html>
<html class="h-100" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: header}" />
    <title>Timba de Pepe - Admin</title>
    <link rel="stylesheet" th:href="@{/css/simple-datatables-10.css}" href="/css/simple-datatables-10.css"
        type="text/css" />
</head>

<body class="d-flex flex-column h-100 bg-dark text-white">
    <header th:replace="~{fragments/nav.html :: nav}"></header>

    <main class="m-auto flex-shrink-0 pt-5 pb-5" style="width:90%">
        
        <h1 class="text-center mb-5 display-4">Panel de Administración</h1>

        <div class="d-flex flex-column gap-5">
            <article class="p-4 border border-3 border-info rounded-3 shadow-lg">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>👥 Gestión de Usuarios</h2>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-dark table-striped align-middle text-center m-0">
                        <thead class="table-info">
                            <tr>
                                <th>Id</th>
                                <th>Usuario</th>
                                <th>Nombre y Apellido</th>
                                <th>Roles</th>
                                <th>Grupos</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">1</td>
                                <td>
                                    <strong class="fs-5" th:text="${user.username}">paco</strong>
                                </td>
                                <td class="text-light" th:text="${user.firstName + ' ' + user.lastName}">
                                    Nombre Apellido
                                </td>
                                <td>
                                    <div class="d-flex flex-wrap justify-content-center gap-1">
                                        <span class="badge bg-secondary" th:each="role : ${user.roles}" th:text="${role}">Role</span>
                                    </div>
                                </td>
                                <td>
                                    <div class="d-flex flex-wrap justify-content-center gap-1">
                                        <span class="badge bg-success" th:each="group : ${user.groups}" th:text="${group}">Grupo</span>
                                    </div>
                                </td>
                                <td>
                                    <form th:action="@{'/admin/toggle/' + ${user.id}}" th:method="post" class="m-0">
                                        <button th:if="${user.enabled}" type="submit"
                                            class="toggle btn btn-danger btn-sm px-3">Deshabilitar</button>
                                        <button th:unless="${user.enabled}" type="submit"
                                            class="toggle btn btn-primary btn-sm px-3">Habilitar</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </article>

            <article class="p-4 border border-3 border-warning rounded-3 shadow-lg">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>✉️ Últimos mensajes del sistema</h2>
                    <button id="refresh" class="btn btn-warning">🔄 Actualizar vía AJAX</button>
                </div>
                
                <div class="table-responsive">
                    <table id="messages" class="table table-dark table-striped w-100 m-0"></table>
                </div>
            </article>
        </div>

    </main>

    <th:block th:replace="~{fragments/footer.html :: footer}" />
    
    <script>
        const toggles = document.querySelectorAll('.toggle');
        toggles.forEach(toggle => {
            toggle.addEventListener('click', (e) => {
                e.preventDefault();
                const form = e.target.parentElement;
                go(form.action, 'POST').then((d) => {
                    if (d.enabled) {
                        e.target.classList.remove('btn-primary');
                        e.target.classList.add('btn-danger');
                        e.target.textContent = 'Deshabilitar';
                    } else {
                        e.target.classList.remove('btn-danger');
                        e.target.classList.add('btn-primary');
                        e.target.textContent = 'Habilitar';
                    }
                    console.log(d);
                });
            });
        });
    </script>

    <script type="module" th:src="@{/js/ajax-admin.js}" src="/js/ajax-admin.js"></script>
</body>

</html>
