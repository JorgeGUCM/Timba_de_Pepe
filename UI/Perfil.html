<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>

    <link rel="stylesheet" href="CSS/bootstrap-5.3.3.css">
    <link rel="stylesheet" href="CSS/bootstrap.css.map">
    <link rel="stylesheet" href="CSS/simple-datatables-10.css">
    <link rel="stylesheet" href="CSS/custom.css">
</head>
<body>
    <main class="flex-shrink-0">
        <div class="m-5">
            <h1 class="mt-5 text-center">Mi Perfil</h1>
            <div class="d-flex justify-content-around">
                <div class="card d-inline-flex" style="width: 20%;">
                    <div class="card-body">
                        <h2>Nombre</h2>
                        <p>Info de Cuenta</p>
                    </div>
                </div>
                <div class="card d-inline-flex" style="width: 20%;">
                    <div class="card-body">
                        <h2>Saldo actual</h2>
                        <p>Numero de Fichas que tiene</p>
                        <p><strong>500</strong> fichas</p>
                        <button>Ingresar Dinero</button>
                    </div>
                </div>
                <div class="card d-inline-flex" style="width: 20%;">
                    <div class="card-body">
                        <h2>Churros totales</h2>
                        <p>Numeros de Churros que tiene</p>
                        <p><strong>50</strong> churros</p>
                    </div>
                </div>
            </div>
            <button class="btn btn-danger btn-center">Borrar Cuenta</button>
        </div>
    </main>
</body>
</html>
