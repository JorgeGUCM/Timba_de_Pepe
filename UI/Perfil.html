<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>

    <link rel="stylesheet" href="CSS/bootstrap-5.3.3.css">
    <link rel="stylesheet" href="CSS/bootstrap.css.map">
    <link rel="stylesheet" href="CSS/simple-datatables-10.css">

                        <p class="mt-5 text-center" style="font-size: 5em;"><strong>500</strong> <svg style="width: 1.2em; transform: translateY(-0.15em);" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M471.9 324.8L320 417.6L168 324.8L320 64L471.9 324.8zM320 447.4L168 354.6L320 576L472 354.6L320 447.4z"/></svg></p>
                        <div class="mt-5 text-center">
                            <button class="btn btn-primary">Ingresar Dinero</button>
                            <button class="btn btn-warning">Sacar Dinero</button>
                        </div>
                    </div>
                </div>
                <div class="card d-inline-flex" style="width: 48%;">
                    <div class="card-body">
                        <h2 class="mx-auto" style="width: fit-content;">Cervezas totales</h2>
                        <p class="mt-5 text-center" style="font-size: 5em;"><strong>5000</strong> <svg style="width: 1.2em; transform: translateY(-0.1em);" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><path d="M96 144C96 117.5 117.5 96 144 96L432 96C458.5 96 480 117.5 480 144L480 160L544 160C579.3 160 608 188.7 608 224L608 332.2C608 356.4 594.3 378.6 572.6 389.4L480 435.8L480 448C480 501 437 544 384 544L192 544C139 544 96 501 96 448L96 144zM480 364.2L544 332.2L544 224L480 224L480 364.2zM224 216C224 202.7 213.3 192 200 192C186.7 192 176 202.7 176 216L176 424C176 437.3 186.7 448 200 448C213.3 448 224 437.3 224 424L224 216zM312 216C312 202.7 301.3 192 288 192C274.7 192 264 202.7 264 216L264 424C264 437.3 274.7 448 288 448C301.3 448 312 437.3 312 424L312 216zM400 216C400 202.7 389.3 192 376 192C362.7 192 352 202.7 352 216L352 424C352 437.3 362.7 448 376 448C389.3 448 400 437.3 400 424L400 216z"/></svg></p>
                    </div>
                </div>
            </div>
            <button class="btn btn-danger btn-center">Borrar Cuenta</button>
        </div>
    </main>
</body>
</html>
